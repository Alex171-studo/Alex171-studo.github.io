title: "Alex171 | Security Researcher"
description: "HTB Writeups & Cybersecurity Journey"
baseurl: ""
url: "https://Alex171-studo.github.io"
author:
  name: "Alex171"
  email: ""
  github: "Alex171-studo"
  htb: "Alex171"
  tryhackme: "Ghost0x"

theme: minima

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .github
  - .vscode
  - instruction.txt
  - AI_PROMPT_TEMPLATE.md

plugins:
  - jekyll-seo-tag

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "Alex171"

# Custom variables for the theme
skills:
  - name: "Pentest Web"
    level: 85
  - name: "Linux / Bash"
    level: 75
  - name: "Python / AI Security"
    level: 70
  - name: "Privilege Escalation"
    level: 65

social:
  github: Alex171-studo
  htb: Alex171
  tryhackme: Ghost0x
