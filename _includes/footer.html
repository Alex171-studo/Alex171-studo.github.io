<footer>
  <div class="container">
    <div class="footer-socials">
      {% if site.author.github %}
      <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
      {% endif %}
      {% if site.author.htb %}
      <a href="https://app.hackthebox.com/users/{{ site.author.htb }}" target="_blank" rel="noopener">HTB</a>
      {% endif %}
      {% if site.author.tryhackme %}
      <a href="https://tryhackme.com/p/{{ site.author.tryhackme }}" target="_blank" rel="noopener">THM</a>
      {% endif %}
    </div>
    <div class="footer-copy">
      &copy; {{ "now" | date: "%Y" }} {{ site.author.name }} | Built with Jekyll & Terminal Vibes
    </div>
  </div>
</footer>
