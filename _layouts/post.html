---
layout: default
---
<article class="post">
  <header class="post-header" style="padding: 4rem 0; background: var(--bg-surface); border-bottom: 1px solid var(--border-color);">
    <div class="container">
      <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
        <span class="badge badge-platform">{{ page.platform }}</span>
        <span class="badge badge-difficulty badge-{{ page.difficulty | downcase }}">{{ page.difficulty }}</span>
      </div>
      <h1 class="font-mono" style="font-size: 3rem; margin-bottom: 1rem;">{{ page.title }}</h1>
      <div class="text-secondary font-mono" style="font-size: 0.9rem;">
        Published on {{ page.date | date: "%B %d, %Y" }} • By {{ page.author }}
      </div>
    </div>
  </header>

  <div class="container" style="padding: 4rem 0;">
    <div class="writeup-content">
      {{ content }}
    </div>
  </div>
</article>

<style>
/* Estilos específicos para o conteúdo do post para garantir legibilidade cyber */
.writeup-content h1, .writeup-content h2, .writeup-content h3 {
  font-family: var(--font-mono);
  color: var(--accent-primary);
  margin-top: 2.5rem;
  margin-bottom: 1rem;
}

.writeup-content p {
  margin-bottom: 1.5rem;
  color: var(--text-primary);
  font-size: 1.1rem;
}

.writeup-content code {
  background: rgba(0, 255, 65, 0.1);
  color: var(--accent-primary);
  padding: 0.2rem 0.4rem;
  border-radius: 3px;
  font-size: 0.9em;
}

.writeup-content pre {
  background: #000;
  border: 1px solid var(--border-color);
  padding: 1.5rem;
  border-radius: 4px;
  overflow-x: auto;
  margin: 1.5rem 0;
}

.writeup-content pre code {
  background: transparent;
  color: #d1d1d1;
  padding: 0;
}

.writeup-content img {
  border: 1px solid var(--border-color);
  margin: 2rem 0;
}
</style>
