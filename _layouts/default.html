<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  
  {% seo %}
</head>
<body class="dark-theme">
  {% include navbar.html %}
  
  <main class="page-content">
    {{ content }}
  </main>
  
  {% include footer.html %}

  <!-- Scripts if needed -->
  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
