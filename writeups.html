---
layout: default
title: "Writeups CTF"
---
<section class="section">
    <div class="container">
        <div class="section-header fade-in">
            <div class="section-label">CTF & Labs</div>
            <h1 class="section-title">Mes <span>Writeups</span></h1>
            <p style="color:var(--text-secondary);margin-top:0.75rem;font-size:0.95rem;">
                Documentation de mes labs sur TryHackMe et PortSwigger — techniques, payloads, leçons apprises.
            </p>
        </div>

        <!-- SEARCH + FILTERS -->
        <div style="margin-bottom:1.5rem;" class="fade-in">
            <div style="position:relative;margin-bottom:1rem;">
                <input type="text" id="search-writeups" placeholder="🔍  Rechercher par nom, tag, technique..."
                    style="width:100%;padding:0.75rem 1rem 0.75rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-mono);font-size:0.85rem;outline:none;transition:var(--transition);"
                    onfocus="this.style.borderColor='var(--border-hover)'"
                    onblur="this.style.borderColor='var(--border)'" />
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Tous ({{ site.posts.size }})</button>
                <button class="filter-btn" data-filter="thm">TryHackMe</button>
                <button class="filter-btn" data-filter="htb">HackTheBox</button>
                <button class="filter-btn" data-filter="portswigger">PortSwigger</button>
                <button class="filter-btn" data-filter="easy">Easy</button>
                <button class="filter-btn" data-filter="medium">Medium</button>
                <button class="filter-btn" data-filter="hard">Hard</button>
            </div>
        </div>

        <!-- WRITEUP CARDS (JS INJECTED) -->
        <div class="writeup-grid" id="writeups-container">
            <!-- Loading... -->
        </div>

        <script>
            // Génération du jeu de données depuis Jekyll (sécurisée avec jsonify)
            const postsData = [
                {% for post in site.posts %}
                {
                    "title": {{ post.title | jsonify }},
                    "url": {{ post.url | relative_url | jsonify }},
                    "date": {{ post.date | date: '%d %b %Y' | jsonify }},
                    "difficulty": {{ post.difficulty | default: 'Easy' | jsonify }},
                    "platform": {{ post.platform | default: 'CTF' | jsonify }},
                    "desc": {{ post.description | default: post.excerpt | strip_html | truncatewords: 25 | jsonify }},
                    "tags": {{ post.tags | jsonify }}
                }{% unless forloop.last %},{% endunless %}
                {% endfor %}
            ];

            const container = document.getElementById('writeups-container');
            const searchInput = document.getElementById('search-writeups');
            const filterBtns = document.querySelectorAll('.filter-btn');

            let currentFilter = 'all';
            let searchQuery = '';

            function renderPosts() {
                container.innerHTML = '';
                
                const filtered = postsData.filter(post => {
                    const searchTerm = searchQuery.toLowerCase();
                    const matchesSearch = post.title.toLowerCase().includes(searchTerm) || 
                                          post.desc.toLowerCase().includes(searchTerm) || 
                                          post.tags.some(t => t.toLowerCase().includes(searchTerm));
                                          
                    let matchesFilter = true;
                    if (currentFilter !== 'all') {
                        const filterVal = currentFilter.toLowerCase();
                        const isDiff = ['easy', 'medium', 'hard'].includes(filterVal);
                        if (isDiff) {
                            matchesFilter = post.difficulty.toLowerCase() === filterVal;
                        } else {
                            // match platform (thm -> tryhackme)
                            let platQuery = filterVal;
                            if (platQuery === 'thm') platQuery = 'tryhackme';
                            if (platQuery === 'htb') platQuery = 'hackthebox';
                            matchesFilter = post.platform.toLowerCase().includes(platQuery);
                        }
                    }
                    
                    return matchesSearch && matchesFilter;
                });

                if (filtered.length === 0) {
                    container.innerHTML = '<div style="color:var(--text-muted); grid-column: 1/-1; padding: 2rem; border: 1px dashed var(--border); border-radius: var(--radius); text-align: center;">Aucun writeup trouvé pour cette recherche.</div>';
                    return;
                }

                filtered.forEach((post, index) => {
                    const delay = index * 0.05;
                    const diffLower = post.difficulty.toLowerCase();
                    const tagsHtml = post.tags.slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('');
                    
                    const card = document.createElement('article');
                    card.className = 'card writeup-card fade-in';
                    card.style.animationDelay = delay + 's';
                    card.style.cursor = 'pointer';
                    card.onclick = () => window.location.href = post.url;
                    
                    card.innerHTML = `
                        <div class="writeup-card-header">
                            <span class="writeup-platform">${post.platform}</span>
                            <span class="diff diff-${diffLower}">${post.difficulty}</span>
                        </div>
                        <h2 class="writeup-title">${post.title}</h2>
                        <p class="writeup-desc" style="flex:1;">${post.desc}</p>
                        <div class="writeup-tags">${tagsHtml}</div>
                        <div class="writeup-footer" style="margin-top:1.5rem;">
                            <span>${post.date}</span>
                            <span class="writeup-link">Lire le writeup →</span>
                        </div>
                    `;
                    card.style.display = 'flex';
                    card.style.flexDirection = 'column';
                    container.appendChild(card);
                });
            }

            // Event Listeners
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderPosts();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    renderPosts();
                });
            });

            // Handle URL params for fake terminal interactions
            const params = new URLSearchParams(window.location.search);
            if (params.has('difficulty')) {
                const diff = params.get('difficulty').toLowerCase();
                const btn = document.querySelector(`.filter-btn[data-filter="${diff}"]`);
                if (btn) {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = diff;
                }
            }

            renderPosts();
        </script>

        <!-- STATS BOTTOM -->
        <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:3rem;padding:1.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);"
            class="fade-in">
            <div class="stat"><span class="stat-number">{{ site.posts.size }}</span><span class="stat-label">Writeups publiés</span>
            </div>
            <div class="stat"><span class="stat-number">+</span><span class="stat-label">En cours...</span>
            </div>
        </div>
    </div>
</section>
